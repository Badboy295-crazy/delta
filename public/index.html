<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeltaStudy Pro Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader {
            border-top-color: #3b82f6;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">

    <nav class="bg-gray-800 border-b border-gray-700 px-6 py-4 sticky top-0 z-50 shadow-lg">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-500 tracking-wide">DeltaStudy Live System</h1>
            <span id="statusBadge" class="bg-green-500 text-gray-900 text-xs font-semibold px-2.5 py-0.5 rounded-full">System Connected</span>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8 space-y-12">

        <div id="loadingOverlay" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12"></div>
        </div>

        <section>
            <h2 class="text-xl font-bold border-l-4 border-blue-500 pl-3 mb-6">Select Active Batch</h2>
            <div id="batchesContainer" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                </div>
        </section>

        <section id="subjectsSection" class="hidden">
            <h2 class="text-xl font-bold border-l-4 border-purple-500 pl-3 mb-6">Main Subjects</h2>
            <div id="subjectsContainer" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                </div>
        </section>

        <section id="topicsSection" class="hidden">
            <h2 class="text-xl font-bold border-l-4 border-pink-500 pl-3 mb-6">Topics & Sub-Subjects</h2>
            <div id="topicsContainer" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                </div>
        </section>

        <section id="lecturesSection" class="hidden">
            <h2 class="text-xl font-bold border-l-4 border-emerald-500 pl-3 mb-6">Available Lectures</h2>
            <div id="lecturesContainer" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                </div>
        </section>

    </main>

    <script src="app.js"></script>
</body>
</html>
